<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Hồ sơ người dùng - NoteHub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      background: #f5f7fb;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 320px;
      height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 260px;
      background: #ffffff;
      border-right: 1px solid #e5e7eb;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: #2563eb;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-right: 8px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #2563eb;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px;
      border-radius: 6px;
      font-size: 14px;
      color: #111827;
      text-decoration: none;
      margin-bottom: 4px;
    }

    .nav-link:hover {
      background: #f3f4ff;
    }

    .nav-link.active {
      color: #2563eb;
    }

    .nav-icon {
      font-size: 18px;
    }

    .nav-section-title {
      font-size: 11px;
      letter-spacing: 1px;
      color: #9ca3af;
      margin: 14px 0 8px;
    }

    .nav-icon-circle {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .nav-count {
      margin-left: auto;
      font-size: 13px;
      color: #6b7280;
    }

    /* ===== MAIN ===== */
    .main {
      border-right: 1px solid #e1e4ea;
      display: flex;
      flex-direction: column;
      background: #f5f7fb;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid #e1e4ea;
      background: #ffffff;
    }

    .search {
      flex: 1;
      border: 1px solid #e5e7eb;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
    }

    .btn-primary {
      margin-left: 16px;
      background: #2563eb;
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-account {
      margin-left: 12px;
      border: 1px solid #d1d5db;
      padding: 8px 14px;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }

    .content {
      padding: 24px;
      overflow-y: auto;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      margin: 0 auto;
    }

    .card h2 {
      margin-bottom: 4px;
      font-size: 22px;
    }

    .card p.sub {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
      flex: 1;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #4b5563;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-secondary {
      border: 1px solid #d1d5db;
      background: #ffffff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    /* ===== RIGHT BAR ===== */
    .rightbar {
      background: #f9fafb;
      padding: 20px;
    }

    .rightbar h4 {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      color: #4b5563;
    }

    .summary-label {
      font-weight: 500;
    }

    .summary-value {
      color: #111827;
    }
  </style>
</head>

<body>
  <div class="layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">N</div>
        <div class="brand-name"><a href="{{url_for('home')}}" style="text-decoration: none; color: #2563eb;">NoteHub</a>
        </div>
      </div>

      <nav class="nav-main">
        <a href="{{ url_for('home') }}" class="nav-link">
          <span class="nav-icon">🏠</span>
          <span>Trang chủ</span>
        </a>
        <a href="{{ url_for('api_my_note') }}" class="nav-link">
          <span class="nav-icon">📝</span>
          <span>Ghi chú của tôi</span>
        </a>
      </nav>

      <div class="nav-section-title">DANH MỤC</div>

      <nav class="nav-categories">
        <a href="{{ url_for('hoctap') }}" class="nav-link">
          <span class="nav-icon-circle">🎓</span>
          <span>Học tập</span>
          <span class="nav-count">0</span>
        </a>
        <a href="{{ url_for('congviec') }}" class="nav-link">
          <span class="nav-icon-circle">💼</span>
          <span>Công việc</span>
          <span class="nav-count">0</span>
        </a>
        <a href="{{ url_for('canhan') }}" class="nav-link">
          <span class="nav-icon-circle">👤</span>
          <span>Cá nhân</span>
          <span class="nav-count">0</span>
        </a>
        <a href="#" class="nav-link">
          <span class="nav-icon-circle">…</span>
          <span>Khác</span>
          <span class="nav-count">0</span>
        </a>
      </nav>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main">
      <header class="topbar">
        <input class="search" placeholder="Tìm kiếm ghi chú..." />
        <button class="btn-primary">+ Thêm ghi chú</button>
        <button class="btn-account">Tài khoản ▾</button>
      </header>

      <section class="content">
        <div class="card">
          <h2>Hồ sơ người dùng</h2>

          <!-- user_id chỉ hiển thị -->
          <div class="form-group">
            <label>Mã người dùng (user_id)</label>
            <input type="text" id="user_id" value="{{ user.user_id }}" readonly>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Tên đăng nhập (username)</label>
              <input type="text" id="username" value="{{ user.username }}">
            </div>

            <div class="form-group">
              <label>Giới tính</label>
              <input type="text" id="username" value="{{ user.gender }}">
            </div>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" value="{{ user.email }}">
          </div>

          <div class="form-group">
            <label>Mật khẩu mới</label>
            <input type="password" id="password" value="{{ user.password }}">
          </div>

          <div class="form-footer">
            <button class="btn-secondary" type="button">Hủy</button>
            <button class="btn-primary" type="button" onclick="saveProfile()">Lưu thay đổi</button>
          </div>
        </div>
      </section>
    </main>

    <!-- ===== RIGHT BAR ===== -->
    <aside class="rightbar">
      <h4>Tóm tắt tài khoản</h4>
      <div class="summary-item">
        <span class="summary-label">Tên đăng nhập</span>
        <span class="summary-value" id="summary-username">
          {{ user.username }}
        </span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Email</span>
        <span class="summary-value" id="summary-email">
          {{ user.email }}
        </span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Giới tính</span>
        <span class="summary-value" id="summary-gender">
          {{ user.gender or '—' }}
        </span>
      </div>
    </aside>

  </div>

</body>

</html>
